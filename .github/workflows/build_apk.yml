name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Flet
        run: pip install flet
      - name: Build APK
        run: flet build apk --verbose
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-build-output
          path: build/apk/app-release-signed.apk
