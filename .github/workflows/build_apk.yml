name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flet pandas openpyxl

      - name: Build APK
        env:
          FLET_NO_INPUT: "true"
        run: |
          # Utilisation de flet build apk sans --project si vous êtes à la racine
          yes | flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-build-output
          # On cible le dossier spécifique des APK pour ne pas avoir un fichier de 1.5 Go
          path: build/apk/app/outputs/flutter-apk/*.apk
