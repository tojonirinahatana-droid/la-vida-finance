name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install flet

      - name: Build APK
        run: |
          # C'est ici que ça se joue : --release est obligatoire pour que l'appli tourne sans PC
          # --split-per-abi réduit la taille et garantit la compatibilité avec votre Honor 8x
          flet build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # On récupère tous les fichiers générés
          path: build/apk/app/outputs/flutter-apk/*.apk
