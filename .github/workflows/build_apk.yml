name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install flet
      - name: Build APK
        env:
          FLET_NO_INPUT: 1
          # On définit les variables d'environnement pour qu'il n'ait rien à demander
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          yes | flet build apk --skip-upload --no-deps
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-build-output
          path: build/apk/app-release-signed.apk
