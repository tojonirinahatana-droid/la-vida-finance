name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev

      - name: Build with Buildozer
        run: |
          # On affiche le contenu du dossier pour trouver l'APK
          buildozer android debug
          echo "Contenu du dossier après build :"
          ls -R
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-build-output
          path: bin/*.apk
