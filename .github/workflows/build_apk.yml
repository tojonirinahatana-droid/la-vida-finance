name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install flet
          # Assurez-vous que flet est bien dans votre projet

      - name: Build APK
        run: |
          # Cette commande prend du temps, c'est normal
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-build-output
          path: build/apk/app/outputs/flutter-apk/*.apk
